<style>
  :root {
    --ci-blue: #1a3dcc;
    --ci-blue-light: #e8edfa;
    --ci-blue-pale: #f3f5fd;
    --gray: #8fa3b8;
    --light-gray: #d0d9ee;
    --bg: #f3f5fd;
    --navy-text: #0d1f5c;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-text-size-adjust:100%; }
  html, body { width:100%; background:var(--bg); font-family:'Noto Sans KR',sans-serif; }

  .topbar {
    width: 100%;
    background: white;
    border-bottom: 2.5px solid var(--ci-blue);
    padding: 20px 24px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .topbar img {
    width: min(72%, 336px);
    height: auto;
    display: block;
  }

  .content { width:100%; background:white; padding:20px 16px 40px; }

  .section-label {
    font-size: clamp(10px,2.8vw,12px);
    color: var(--ci-blue);
    letter-spacing: 2px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 4px;
    opacity: 0.65;
  }
  .section-divider { border:none; border-top:1px solid var(--light-gray); margin:20px 0 16px; }

  .ac-card {
    display: flex;
    align-items: center;
    gap: clamp(12px,4vw,20px);
    width: 100%;
    background: var(--ci-blue-pale);
    border: 1.5px solid var(--light-gray);
    border-radius: clamp(12px,4vw,18px);
    padding: clamp(14px,4.5vw,20px) clamp(12px,4vw,18px);
    margin-bottom: clamp(10px,3vw,14px);
    text-decoration: none;
    color: inherit;
  }
  .ac-card:active { background:var(--ci-blue-light); border-color:var(--ci-blue); }

  .icon {
    width: clamp(42px,12vw,60px);
    height: clamp(42px,12vw,60px);
    min-width: clamp(42px,12vw,60px);
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: #e8edf8;
  }
  .icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .ac-text { flex:1; min-width:0; }
  .reg {
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:clamp(26px,7.5vw,38px);
    letter-spacing:clamp(2px,0.8vw,4px);
    color:var(--navy-text);
    line-height:1.1;
  }
  .ac-name { font-size:clamp(11px,3vw,14px); color:var(--ci-blue); font-weight:700; margin-top:2px; }
  .ac-sub { font-size:clamp(11px,3vw,13px); color:var(--gray); margin-top:2px; font-weight:300; }

  .badge {
